apiVersion: apps/v1
kind: Deployment
metadata:
  name: poke-app
  labels:
    app: poke-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: poke-app
  template:
    metadata:
      labels:
        app: poke-app
      annotations:
        # 1. 啟用 Java 自動插樁（注入監控助手）
        instrumentation.opentelemetry.io/inject-java: "true"
        # 2. 關鍵防錯：指定監控助手「只」注入到名為 springboot-backend 的容器
        sidecar.opentelemetry.io/inject: "true"
        instrumentation.opentelemetry.io/container-names: "springboot-backend"
    spec:
      containers:
      # 容器 1：Vue 前端網頁
      - name: vue-frontend
        image: beibei860429/vue-pokemon:latest
        ports:
        - containerPort: 80
      
      # 容器 2：Spring Boot 後端
      # 注意：這裡的 Image 標籤要讓 Jenkins 可以精準比對置換
      - name: springboot-backend
        image: beibei860429/springboot-api:v_28
        ports:
        - containerPort: 8081
        env:
          - name: APP_CORS_ALLOWED_ORIGINS
            value: "http://13.233.163.121:30080"
---
apiVersion: v1
kind: Service
metadata:
  name: poke-service
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 80
    nodePort: 30080
  selector:
    app: poke-app
